[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "calendar-mcp"
version = "0.0.0"
description = "Calendar connector (CalDAV) — library + stdio MCP. One credential home for the hub."
requires-python = ">=3.11"
dependencies = ["pydantic>=2.5"]

[project.optional-dependencies]
# `caldav` is only needed to talk to a live server (lazily imported in backend.py); kept optional
# so the read-path library + the aggregator install without it. `mcp` only to RUN the stdio server.
caldav = ["caldav>=1.3"]
server = ["mcp>=1.2", "caldav>=1.3"]
dev = ["pytest>=8.0"]

[project.scripts]
calendar-mcp = "calendar_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/calendar_mcp"]
