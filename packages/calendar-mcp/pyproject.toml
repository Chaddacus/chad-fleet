[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "calendar-mcp"
version = "0.0.0"
description = "Calendar connector (CalDAV) — library + stdio MCP. One credential home for the hub."
requires-python = ">=3.11"
# Google Calendar is the primary backend (service account), so its client libs are real deps
# (lazily imported in backend.py so `accounts`/imports work without them). CalDAV is a fallback.
dependencies = [
    "pydantic>=2.5",
    "google-api-python-client>=2.100",
    "google-auth>=2.20",
]

[project.optional-dependencies]
# CalDAV fallback backend (lazily imported); `mcp` only to RUN the stdio server.
caldav = ["caldav>=1.3"]
server = ["mcp>=1.2"]
dev = ["pytest>=8.0"]

[project.scripts]
calendar-mcp = "calendar_mcp.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/calendar_mcp"]
