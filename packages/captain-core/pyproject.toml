[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "captain-core"
version = "0.1.0"
description = "Core reasoning engine for Chad Captain (closed source)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "state-aggregator",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/captain_core"]

[tool.uv.sources]
state-aggregator = { path = "../state-aggregator", editable = true }
