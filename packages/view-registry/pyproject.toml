[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "view-registry"
version = "0.0.0"
description = "Registry of user-saved views (reusable LLM prompts) for the genui-renderer"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "fastapi>=0.110",
    "uvicorn>=0.28",
    "fastmcp>=0.2",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[project.scripts]
view-registry = "view_registry.server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/view_registry"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
