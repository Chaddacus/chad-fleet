[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "state-aggregator"
version = "0.0.0"
description = "Aggregates cross-source state into a unified snapshot"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "fastapi>=0.110",
    "uvicorn>=0.27",
    "tracked-app-registry",
    "email-mcp",
]

[tool.uv.sources]
tracked-app-registry = { workspace = true }
email-mcp = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "httpx>=0.27"]

[project.scripts]
state-aggregator = "state_aggregator.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/state_aggregator"]
