[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "notifier-hub-ntfy"
version = "0.0.0"
description = "Notifier adapter: pushes events to ntfy.sh topics"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "httpx>=0.27",
    "notifier-hub-core",
]

[tool.uv.sources]
notifier-hub-core = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-mock>=3.12"]

[tool.hatch.build.targets.wheel]
packages = ["src/notifier_hub_ntfy"]
