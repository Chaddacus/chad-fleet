[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "notifier-hub-dashboard-inbox"
version = "0.0.0"
description = "Notifier adapter: writes events to the chad-dashboard inbox"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "notifier-hub-core",
]

[tool.uv.sources]
notifier-hub-core = { path = "../../core", editable = true }

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.hatch.build.targets.wheel]
packages = ["src/notifier_hub_dashboard_inbox"]
