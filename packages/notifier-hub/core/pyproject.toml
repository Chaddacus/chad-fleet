[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "notifier-hub-core"
version = "0.0.0"
description = "Routing engine: accepts events and fans out to notification adapters"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "fastmcp>=0.2",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
notifier-hub = "notifier_hub_core.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/notifier_hub_core"]
