[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voice-drafter"
version = "0.0.0"
description = "Drafts content in Chad's voice from structured inputs"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
    "fastmcp>=0.2",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
]

[project.scripts]
voice-drafter = "voice_drafter.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_drafter"]
