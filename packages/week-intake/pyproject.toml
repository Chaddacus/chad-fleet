[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "week-intake"
version = "0.0.0"
description = "Weekly task intake, clarifier-loop, and router into chad-fleet (chad-captain)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5",
    "httpx>=0.27",
    "tracked-app-registry",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
]

[project.scripts]
chad-week = "week_intake.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/week_intake"]

[tool.uv.sources]
tracked-app-registry = { workspace = true }
